<script>
var jlist = $('#recommendlist');
var jcheckall = $('#checkall');
var jbatchCancel = $('#batch_cancel');

jcheckall.on('change', function() {
	jlist.find('input[name="tid"]').prop('checked', this.checked);
});

function recommend_cancel(tids, callback) {
	$.xpost(xn.url('thread-recommend_cancel'), {tids:tids}, function(code, message) {
		if(code != 0) return $.alert(message);
		callback && callback(message);
	});
}

jlist.on('click', '.recommend-cancel', function() {
	var jtr = $(this).parents('tr');
	var tid = jtr.attr('tid');
	if(!window.confirm('确定取消该主题的首页首屏推荐？')) return false;
	recommend_cancel([tid], function() {
		jtr.remove();
	});
	return false;
});

jbatchCancel.on('click', function() {
	var jchecked = jlist.find('input[name="tid"]:checked');
	if(jchecked.length < 1) return alert('请选择需要取消推荐的主题');
	if(!window.confirm('确定批量取消选中主题的首页首屏推荐？')) return false;
	var tids = [];
	jchecked.each(function() {
		tids.push($(this).val());
	});
	recommend_cancel(tids, function() {
		jchecked.each(function() {
			$(this).parents('tr').remove();
		});
	});
	return false;
});

$('#nav li.nav-item-thread').addClass('active');
</script>
