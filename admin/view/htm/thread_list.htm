<script>
var jlist = $('#threadlist');
var jcheckall = $('#checkall');

jcheckall.on('change', function() {
	jlist.find('input[name="tid"]').prop('checked', this.checked);
});

$('.batch-op').on('click', function() {
	var op = $(this).attr('id');
	var jchecked = jlist.find('input[name="tid"]:checked');
	if(jchecked.length < 1) return alert('请选择需要操作的主题');
	var tips = op == 'delete' ? '确定删除选中的主题？删除后不可恢复。' : (op == 'close' ? '确定关闭选中的主题？' : '确定打开选中的主题？');
	if(!window.confirm(tips)) return false;
	var tids = [];
	jchecked.each(function() {
		tids.push($(this).val());
	});
	$.xpost(xn.url('thread-operation-' + op), {tids:tids}, function(code, message) {
		if(code != 0) return $.alert(message);
		window.location.reload();
	});
	return false;
});

$('#nav li.nav-item-thread').addClass('active');
</script>
