<script>
$('li[data-active="fid-0"]').addClass('active');

var jindexBacktop = $('#bbs_index_backtop');
$(window).on('scroll', function() {
	if($(window).scrollTop() > 260) {
		jindexBacktop.addClass('show');
	} else {
		jindexBacktop.removeClass('show');
	}
});
jindexBacktop.on('click', function() {
	$('html, body').animate({scrollTop: 0}, 220);
	return false;
});

$('#bbs_checkin_btn').on('click', function() {
	var jbtn = $(this);
	jbtn.button('loading');
	$.xpost(xn.url('checkin-do'), function(code, message) {
		if(code == 0) {
			$.alert(message.message || '签到成功').delay(1000).location('');
		} else {
			$.alert(message);
			jbtn.button('reset');
		}
	});
});

$('#bbs_rank_tabs a').on('click', function() {
	var jtab = $(this);
	var rank = jtab.data('rank');
	jtab.addClass('active').siblings().removeClass('active');
	$('.bbs-side-rank-panel').removeClass('active');
	$('.bbs-side-rank-panel[data-rank-panel="'+rank+'"]').addClass('active');
	return false;
});
</script>
