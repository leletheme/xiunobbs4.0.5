jform.on('submit', function() {

		} else {
			$.alert(message);
			//jform.find('[name="'+code+'"]').alert(message).focus();
			jsubmit.button('reset');
		}
	});
	return false;
});

var jattachparent = $('.attachlist_parent');
$('#addattach').on('change', function(e) {
	var files = xn.get_files_from_event(e);
	if (!files) return;
	
	// 并发下会 服务端 session 写入会有问题，由客户端控制改为串行
	if (!jattachparent.find('.attachlist').length) {
		jattachparent.append('<fieldset class="fieldset"><legend><?php echo lang('uploaded_attach');?></legend><ul class="attachlist"><ul></fieldset>');
	}
	
	var jprogress = jattachparent.find('.progress');
	if(!jprogress.length) {
		jprogress = $('<div class="progress"><div class="progress-bar" role="progressbar" style="width: 25%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">25%</div></div>').appendTo(jattachparent);
	}
	jprogressbar = jprogress.find('.progress-bar');

	$.each_sync(files, function(i, callback) {
		var file = files[i];
		xn.upload_file(file, xn.url('attach-create'), {is_image: 0}, function(code, message) {
			if (code != 0) return $.alert(message);
			// 把文件 append 到附件列表
			var url = message.url;
			var filetype = message.filetype;
			var aid = message.aid;
			$('.attachlist').append('<li aid="' + aid + '"><a href="' + message.url + '" target="_blank"><i class="icon filetype ' + filetype + '"></i> ' + message.orgfilename + '</a> <a href="javascript:void(0);" class="delete ml-2"><i class="icon-remove"></i> <?php echo lang('delete');?></a></li>');
			callback();
			jprogress.hide();
		}, function(percent) {
			percent = xn.intval(percent);
			jprogressbar.css('width', percent+'%');
			jprogressbar.text(percent+'%');
			jprogress.show();
			console.log('progress:'+ percent); 
		});
	});
});

// 删除附件
jattachparent.on('click', 'a.delete', function() {
	var jlink = $(this);
	var jli = jlink.parents('li');
	var aid = jli.attr('aid');
	if(!window.confirm(lang.confirm_delete)) return false;
	$.xpost(xn.url('attach-delete-'+aid), function(code, message) {
		if(code != 0) return $.alert(message);
		jlink.parent().remove();
	});
	return false;
})

function bbs_md_escape(s) {
	return $('<div>').text(s).html();
}

function bbs_md_emoji_text(s) {
	var map = {
		':smile:':'😀', ':grin:':'😄', ':joy:':'😂', ':rofl:':'🤣', ':blush:':'😊', ':heart_eyes:':'😍', ':sunglasses:':'😎', ':thinking:':'🤔', ':cry:':'😭', ':angry:':'😡',
		':thumbsup:':'👍', ':thumbsdown:':'👎', ':clap:':'👏', ':pray:':'🙏', ':muscle:':'💪', ':fire:':'🔥', ':tada:':'🎉', ':heart:':'❤️', ':100:':'💯', ':sparkles:':'✨', ':rocket:':'🚀', ':ok:':'✅', ':no:':'❌', ':warning:':'⚠️', ':bulb:':'💡', ':pin:':'📌'
	};
	return s.replace(/:(smile|grin|joy|rofl|blush|heart_eyes|sunglasses|thinking|cry|angry|thumbsup|thumbsdown|clap|pray|muscle|fire|tada|heart|100|sparkles|rocket|ok|no|warning|bulb|pin):/g, function(m) {
		return map[m] || m;
	});
}

function bbs_md_inline(s) {
	s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
	s = s.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
	s = s.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
	s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
	s = s.replace(/==([^=]+)==/g, '<mark>$1</mark>');
	s = s.replace(/\{color:([^\}]+)\}([\s\S]*?)\{\/color\}/g, '<span style="color:$1">$2</span>');
	s = s.replace(/\{center\}([\s\S]*?)\{\/center\}/g, '<div class="text-center">$1</div>');
	s = s.replace(/\{right\}([\s\S]*?)\{\/right\}/g, '<div class="text-right">$1</div>');
	s = s.replace(/!\[([^\]]*)\]\(([^\)]+)\)/g, '<img src="$2" alt="$1">');
	s = s.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
	s = bbs_md_emoji_text(s);
	return s;
}

function bbs_md_render_table(lines) {
	var html = '<table class="table table-bordered table-sm"><tbody>';
	for(var i = 0; i < lines.length; i++) {
		if(/^\s*\|?\s*:?-{3,}:?/.test(lines[i])) continue;
		var cells = lines[i].replace(/^\||\|$/g, '').split('|');
		html += '<tr>';
		for(var j = 0; j < cells.length; j++) {
			var tag = i == 0 ? 'th' : 'td';
			html += '<' + tag + '>' + bbs_md_inline($.trim(cells[j])) + '</' + tag + '>';
		}
		html += '</tr>';
	}
	html += '</tbody></table>';
	return html;
}

function bbs_md_render(s) {
	s = bbs_md_escape(s || '').replace(/\r\n/g, '\n');
	var codeblocks = [];
	s = s.replace(/```[^\n]*\n?([\s\S]*?)```/g, function(all, code) {
		var key = '%%CODEBLOCK' + codeblocks.length + '%%';
		codeblocks.push('<pre><code>' + code.replace(/^\n|\n$/g, '') + '</code></pre>');
		return key;
	});
	var lines = s.split('\n');
	var html = '';
	var paragraph = [];
	var list = null;
	var table = [];
	function flushParagraph() {
		if(paragraph.length) {
			html += '<p>' + bbs_md_inline(paragraph.join('<br>')) + '</p>';
			paragraph = [];
		}
	}
	function flushList() {
		if(list) {
			html += '</' + list + '>';
			list = null;
		}
	}
	function flushTable() {
		if(table.length) {
			html += bbs_md_render_table(table);
			table = [];
		}
	}
	for(var i = 0; i < lines.length; i++) {
		var line = lines[i];
		if(line.indexOf('%%CODEBLOCK') === 0) {
			flushParagraph();
			flushList();
			flushTable();
			html += line;
			continue;
		}
		if($.trim(line) === '') {
			flushParagraph();
			flushList();
			flushTable();
			continue;
		}
		if(/^\|.+\|$/.test(line)) {
			flushParagraph();
			flushList();
			table.push(line);
			continue;
		}
		flushTable();
		var heading = line.match(/^(#{1,6})\s*(\S.*)$/);
		if(heading) {
			flushParagraph();
			flushList();
			html += '<h' + heading[1].length + '>' + bbs_md_inline(heading[2]) + '</h' + heading[1].length + '>';
			continue;
		}
		if(/^---+$/.test($.trim(line))) {
			flushParagraph();
			flushList();
			html += '<hr>';
			continue;
		}
		if(/^&gt;\s*(.+)$/.test(line)) {
			flushParagraph();
			flushList();
			html += '<blockquote>' + bbs_md_inline(line.replace(/^&gt;\s*/, '')) + '</blockquote>';
			continue;
		}
		var task = line.match(/^\s*-\s+\[([ x])\]\s+(.+)$/i);
		if(task) {
			flushParagraph();
			if(list != 'ul') {
				flushList();
				list = 'ul';
				html += '<ul class="bbs-md-task-list">';
			}
			html += '<li><input type="checkbox" disabled' + (task[1].toLowerCase() == 'x' ? ' checked' : '') + '> ' + bbs_md_inline(task[2]) + '</li>';
			continue;
		}
		var ul = line.match(/^\s*[-*]\s+(.+)$/);
		if(ul) {
			flushParagraph();
			if(list != 'ul') {
				flushList();
				list = 'ul';
				html += '<ul>';
			}
			html += '<li>' + bbs_md_inline(ul[1]) + '</li>';
			continue;
		}
		var ol = line.match(/^\s*\d+\.\s+(.+)$/);
		if(ol) {
			flushParagraph();
			if(list != 'ol') {
				flushList();
				list = 'ol';
				html += '<ol>';
			}
			html += '<li>' + bbs_md_inline(ol[1]) + '</li>';
			continue;
		}
		paragraph.push(line);
	}
	flushParagraph();
	flushList();
	flushTable();
	for(var k = 0; k < codeblocks.length; k++) html = html.replace('%%CODEBLOCK' + k + '%%', codeblocks[k]);
	return html;
}

function bbs_md_update_preview() {
	var val = jmessage.val();
	jpreview.html(bbs_md_render(val));
	jwords.text($.trim(val).replace(/\s+/g, '').length);
	jlines.text(val ? val.split(/\r\n|\r|\n/).length : 1);
}

function bbs_md_save_history() {
	if(bbs_md_history_lock) return;
	var val = jmessage.val();
	if(bbs_md_history[bbs_md_history_index] === val) return;
	bbs_md_history = bbs_md_history.slice(0, bbs_md_history_index + 1);
	bbs_md_history.push(val);
	if(bbs_md_history.length > 80) bbs_md_history.shift();
	bbs_md_history_index = bbs_md_history.length - 1;
}

function bbs_md_restore_history(index) {
	if(index < 0 || index >= bbs_md_history.length) return;
	var el = jmessage.get(0);
	var textareaScrollTop = el.scrollTop;
	var pageScrollTop = $(window).scrollTop();
	bbs_md_history_lock = true;
	bbs_md_history_index = index;
	jmessage.val(bbs_md_history[index]);
	bbs_md_update_preview();
	bbs_md_history_lock = false;
	setTimeout(function() {
		bbs_md_restore_focus(el.selectionStart || 0, el.selectionEnd || 0, textareaScrollTop, pageScrollTop);
	}, 0);
}

function bbs_md_restore_focus(selectionStart, selectionEnd, textareaScrollTop, pageScrollTop) {
	var el = jmessage.get(0);
	el.focus({preventScroll: true});
	el.selectionStart = selectionStart;
	el.selectionEnd = selectionEnd;
	el.scrollTop = textareaScrollTop;
	$(window).scrollTop(pageScrollTop);
}

function bbs_md_set_value(val, selectionStart, selectionEnd, textareaScrollTop, pageScrollTop) {
	jmessage.val(val);
	bbs_md_update_preview();
	bbs_md_save_history();
	setTimeout(function() {
		bbs_md_restore_focus(selectionStart, selectionEnd, textareaScrollTop, pageScrollTop);
	}, 0);
}

function bbs_md_insert(before, after, placeholder) {
	var el = jmessage.get(0);
	var val = jmessage.val();
	var start = el.selectionStart || 0;
	var end = el.selectionEnd || 0;
	var textareaScrollTop = el.scrollTop;
	var pageScrollTop = $(window).scrollTop();
	var selected = val.substring(start, end) || placeholder || '';
	var text = before + selected + (after || '');
	var selectionStart = start + before.length;
	var selectionEnd = selectionStart + selected.length;
	bbs_md_set_value(val.substring(0, start) + text + val.substring(end), selectionStart, selectionEnd, textareaScrollTop, pageScrollTop);
}

function bbs_md_insert_lines(prefix, placeholder) {
	var el = jmessage.get(0);
	var val = jmessage.val();
	var start = el.selectionStart || 0;
	var end = el.selectionEnd || 0;
	var textareaScrollTop = el.scrollTop;
	var pageScrollTop = $(window).scrollTop();
	var selected = val.substring(start, end) || placeholder || '列表项';
	var lines = selected.split(/\r\n|\r|\n/);
	for(var i = 0; i < lines.length; i++) lines[i] = (typeof prefix == 'function' ? prefix(i) : prefix) + lines[i].replace(/^\s+/, '');
	var text = lines.join('\n');
	var selectionStart = start;
	var selectionEnd = start + text.length;
	bbs_md_set_value(val.substring(0, start) + text + val.substring(end), selectionStart, selectionEnd, textareaScrollTop, pageScrollTop);
}

function bbs_md_upload_images(files) {
	if(!files || !files.length) return;
	var el = jmessage.get(0);
	var textareaScrollTop = el.scrollTop;
	var pageScrollTop = $(window).scrollTop();
	$.each_sync(files, function(i, callback) {
		var file = files[i];
		if(!/^image\//i.test(file.type || '')) {
			$.alert('请选择图片文件');
			callback();
			return;
		}
		xn.upload_file(file, xn.url('attach-create'), {is_image: 1}, function(code, message) {
			if(code != 0) {
				$.alert(message);
				callback();
				return;
			}
			var alt = message.orgfilename || '图片';
			bbs_md_insert('![' + alt + '](', ')', message.url);
			var aid = message.aid;
			var filetype = message.filetype || 'image';
			if(!jattachparent.find('.attachlist').length) {
				jattachparent.append('<fieldset class="fieldset"><legend><?php echo lang('uploaded_attach');?></legend><ul class="attachlist"><ul></fieldset>');
			}
			$('.attachlist').append('<li aid="' + aid + '"><a href="' + message.url + '" target="_blank"><i class="icon filetype ' + filetype + '"></i> ' + alt + '</a> <a href="javascript:void(0);" class="delete ml-2"><i class="icon-remove"></i> <?php echo lang('delete');?></a></li>');
			setTimeout(function() {
				el.scrollTop = textareaScrollTop;
				$(window).scrollTop(pageScrollTop);
			}, 0);
			callback();
		}, function() {});
	});
}

jimageupload.on('change', function(e) {
	var files = xn.get_files_from_event(e);
	bbs_md_upload_images(files);
	this.value = '';
});

$('.bbs-md-toolbar button, .bbs-md-emoji-panel button').on('click', function() {
	var emoji = $(this).data('emoji');
	if(emoji) {
		bbs_md_insert(emoji, '', '');
		return false;
	}
	var type = $(this).data('md');
	var value = $(this).data('value');
	if(type == 'preview') {
		jmdeditor.toggleClass('preview-on');
		$(this).toggleClass('active');
		bbs_md_update_preview();
		return false;
	}
	if(type == 'fullscreen') {
		jmdeditor.toggleClass('fullscreen-on');
		$(this).toggleClass('active');
		jmessage.focus();
		return false;
	}
	if(type == 'undo') bbs_md_restore_history(bbs_md_history_index - 1);
	if(type == 'redo') bbs_md_restore_history(bbs_md_history_index + 1);
	if(type == 'h1') bbs_md_insert('# ', '', '一级标题');
	if(type == 'h2') bbs_md_insert('## ', '', '二级标题');
	if(type == 'h3') bbs_md_insert('### ', '', '三级标题');
	if(type == 'bold') bbs_md_insert('**', '**', '加粗文字');
	if(type == 'italic') bbs_md_insert('*', '*', '斜体文字');
	if(type == 'strike') bbs_md_insert('~~', '~~', '删除线文字');
	if(type == 'quote') bbs_md_insert_lines('> ', '引用内容');
	if(type == 'ul') bbs_md_insert_lines('- ', '列表项');
	if(type == 'ol') bbs_md_insert_lines(function(i) { return (i + 1) + '. '; }, '列表项');
	if(type == 'task') bbs_md_insert_lines('- [ ] ', '待办事项');
	if(type == 'code') bbs_md_insert('`', '`', '代码');
	if(type == 'codeblock') bbs_md_insert('\n```\n', '\n```\n', '在这里输入代码');
	if(type == 'link') bbs_md_insert('[', '](https://)', '链接文字');
	if(type == 'image') {
		jimageupload.trigger('click');
		return false;
	}
	if(type == 'hr') bbs_md_insert('\n---\n', '', '');
	if(type == 'table') bbs_md_insert('\n| 标题一 | 标题二 | 标题三 |\n| --- | --- | --- |\n| 内容 | 内容 | 内容 |\n', '', '');
	if(type == 'color') bbs_md_insert('{color:' + value + '}', '{/color}', '彩色文字');
	if(type == 'mark') bbs_md_insert('==', '==', '高亮文字');
	if(type == 'center') bbs_md_insert('{center}\n', '\n{/center}', '居中内容');
	if(type == 'right') bbs_md_insert('{right}\n', '\n{/right}', '右对齐内容');
	if(type == 'emoji') bbs_md_insert(value, '', '');
	if(type == 'emoji_panel') {
		$('#bbs_md_emoji_panel').toggleClass('show');
		return false;
	}
	if(type == 'clear' && window.confirm('确定要清空编辑器内容吗？')) {
		jmessage.val('');
		bbs_md_update_preview();
		bbs_md_save_history();
	}
	return false;
});

jmessage.on('input', function() {
	bbs_md_update_preview();
	bbs_md_save_history();
});

jmessage.on('keydown', function(e) {
	if(e.ctrlKey && e.keyCode == 66) {
		e.preventDefault();
		bbs_md_insert('**', '**', '加粗文字');
	}
	if(e.ctrlKey && e.keyCode == 73) {
		e.preventDefault();
		bbs_md_insert('*', '*', '斜体文字');
	}
	if(e.ctrlKey && e.keyCode == 75) {
		e.preventDefault();
		bbs_md_insert('[', '](https://)', '链接文字');
	}
	if(e.ctrlKey && e.keyCode == 80) {
		e.preventDefault();
		$('.bbs-md-toolbar button[data-md="preview"]').trigger('click');
	}
	if(e.ctrlKey && e.keyCode == 89) {
		e.preventDefault();
		bbs_md_restore_history(bbs_md_history_index + 1);
	}
});

bbs_md_update_preview();
bbs_md_save_history();

jform.find('[name="fid"]').checked(<?php echo $fid;?>);

$('li[data-active="bbs"]').addClass('active');
$('li[data-active="fid-<?php echo $fid;?>"]').addClass('active');

</script>
